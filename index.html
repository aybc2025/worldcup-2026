  <meta charset="UTF-8" />

  <meta name="theme-color" content="#00cec9" />
  <meta name="description" content="FIFA World Cup 2026 — Live scores, groups, knockout bracket, teams & players" />

  <!-- Open Graph -->

  <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="%BASE_URL%icons/icon.svg" />

  <title>World Cup 2026</title>
  <script>
    // Decode the path that 404.html encoded as a query string
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        })
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded[1] ? '&' + decoded[1].slice(1) : '') +
          l.hash
        )
      }
    }(window.location))
  </script>
</head>

  <div id="root"></div>

</body>
