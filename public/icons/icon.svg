<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080c10"/>

  <!-- Outer ring -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="#00cec9" stroke-width="8" opacity="0.3"/>

  <!-- Soccer ball -->
  <circle cx="256" cy="220" r="110" fill="#0e1520" stroke="#1e2d3d" stroke-width="4"/>

  <!-- Ball pentagon pattern (simplified) -->
  <polygon points="256,130 300,160 284,210 228,210 212,160" fill="#00cec9" opacity="0.15" stroke="#00cec9" stroke-width="2"/>
  <polygon points="256,310 300,280 284,230 228,230 212,280" fill="none" stroke="#00cec9" stroke-width="1.5" opacity="0.4"/>
  <polygon points="156,180 186,152 212,160 212,210 170,230" fill="none" stroke="#00cec9" stroke-width="1.5" opacity="0.4"/>
  <polygon points="356,180 326,152 300,160 300,210 342,230" fill="none" stroke="#00cec9" stroke-width="1.5" opacity="0.4"/>

  <!-- Center circle accent -->
  <circle cx="256" cy="220" r="28" fill="#00cec9" opacity="0.2"/>
  <circle cx="256" cy="220" r="12" fill="#00cec9" opacity="0.6"/>

  <!-- "26" text -->
  <text x="256" y="390" font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="#00cec9" text-anchor="middle" letter-spacing="4">2026</text>

  <!-- Bottom label -->
  <text x="256" y="430" font-family="system-ui, sans-serif" font-size="22"
        fill="#6a7f96" text-anchor="middle" letter-spacing="6">WORLD CUP</text>
</svg>
